services:
  - type: web
    name: driver-drowsiness-monitor-winner
    runtime: python
    plan: free
    region: singapore
    branch: main
    buildCommand: python -m pip install --upgrade pip && python -m pip install -r requirements.txt
    startCommand: gunicorn web_server:app --bind 0.0.0.0:$PORT --workers 1 --threads 4 --timeout 120
    healthCheckPath: /api/healthz
    autoDeployTrigger: checksPass
    envVars:
      - key: PYTHON_VERSION
        value: 3.12.10
      - key: DMS_RUNTIME_PROFILE
        value: recommended
